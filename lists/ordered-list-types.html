<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Ordered List Types</title>
</head>
<body>

<h1>Ordered List Types</h1>

<ol type="A">
  <li>Apple</li>
  <li>Orange</li>
  <li>Mango</li>
</ol>

<ol type="a">
  <li>Apple</li>
  <li>Orange</li>
  <li>Mango</li>
</ol>

<ol type="1">
  <li>Apple</li>
  <li>Orange</li>
  <li>Mango</li>
</ol>

<ol type="i">
  <li>Apple</li>
  <li>Orange</li>
  <li>Mango</li>
</ol>

<ol type="I">
  <li>Apple</li>
  <li>Orange</li>
  <li>Mango</li>
</ol>

</body>
</html>
